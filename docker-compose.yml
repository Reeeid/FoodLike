services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: foodlike
      MYSQL_USER: foodlike
      MYSQL_PASSWORD: foodlike
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    # アプリ設定は backend/.env に集約(実行時注入)。ここはインフラ結線だけ。
    env_file:
      - ./backend/.env
    environment:
      # マウントしたサービスアカウント鍵のコンテナ内パス(volumeと対で管理)
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/firebase-adminsdk.json
    volumes:
      - ./foodlikeauth-firebase-adminsdk-fbsvc-905a53ed2b.json:/secrets/firebase-adminsdk.json:ro
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      # NEXT_PUBLIC_* は frontend/.env.local を next build が読んで焼き込む(build.args不要)
      context: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
